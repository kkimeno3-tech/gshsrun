<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경곽 러닝 챌린지 현황</title>
<style>
  :root {
    --gold:   #B8860B;
    --silver: #708090;
    --bronze: #A0522D;
    --bg:     #f4f3f0;
    --card:   #ffffff;
    --border: rgba(0,0,0,0.08);
    --text:   #1a1a1a;
    --muted:  #777;
    --purple: #7F77DD;
    --teal:   #1D9E75;
    --blue:   #378ADD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* 전체 레이아웃 */
  .page {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 14px;
    gap: 12px;
  }

  /* 상단 헤더 바 */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .top-bar h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .top-bar .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .date-badge {
    font-size: 13px; padding: 4px 14px; border-radius: 20px;
    background: white; border: 1px solid var(--border); color: var(--muted);
  }

  /* 4분할 그리드 */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    flex: 1;
    min-height: 0;
  }

  /* 패널 */
  .panel {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .panel-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-title { font-size: 15px; font-weight: 700; }
  .tag {
    font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 600;
  }
  .tag-cls   { background: #EEEDFE; color: #3C3489; }
  .tag-lab   { background: #E1F5EE; color: #085041; }
  .tag-staff { background: #E6F1FB; color: #0C447C; }
  .tag-stu   { background: #FAEEDA; color: #633806; }

  /* 패널 내 스크롤 영역 */
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  /* 학급 행 */
  .cls-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
  }
  .cls-row.r1 { border-left: 3px solid var(--gold);   background: #fffdf5; }
  .cls-row.r2 { border-left: 3px solid var(--silver); background: #fafafa; }
  .cls-row.r3 { border-left: 3px solid var(--bronze); background: #fdf9f7; }
  .cls-rank { font-size: 13px; font-weight: 700; min-width: 20px; color: var(--muted); }
  .cls-rank.g { color: var(--gold); }
  .cls-rank.s { color: var(--silver); }
  .cls-rank.b { color: var(--bronze); }
  .cls-name { font-size: 14px; font-weight: 700; min-width: 80px; }
  .cls-info { flex: 1; min-width: 0; }
  .cls-meta { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .bar-bg { height: 4px; background: #eee; border-radius: 3px; }
  .bar-fill { height: 4px; border-radius: 3px; }
  .cls-right { text-align: right; flex-shrink: 0; }
  .cls-dist { font-size: 15px; font-weight: 700; }
  .cls-unit { font-size: 11px; color: var(--muted); }
  .cls-avg  { font-size: 11px; color: var(--muted); }

  /* 러너 행 */
  .run-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
  }
  .run-row.r1 { border-left: 3px solid var(--gold);   background: #fffdf5; }
  .run-row.r2 { border-left: 3px solid var(--silver); background: #fafafa; }
  .run-row.r3 { border-left: 3px solid var(--bronze); background: #fdf9f7; }
  .run-rank { font-size: 13px; font-weight: 700; min-width: 20px; color: var(--muted); }
  .run-rank.g { color: var(--gold); }
  .run-rank.s { color: var(--silver); }
  .run-rank.b { color: var(--bronze); }
  .run-info { flex: 1; min-width: 0; }
  .run-name { font-size: 14px; font-weight: 700; }
  .run-nick { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .run-bar  { height: 3px; background: #eee; border-radius: 3px; margin-top: 4px; }
  .run-bar-fill { height: 3px; border-radius: 3px; }
  .run-right { text-align: right; flex-shrink: 0; }
  .run-dist { font-size: 14px; font-weight: 700; }
  .run-unit { font-size: 11px; color: var(--muted); }
  .pct-pill { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 20px; margin-top: 2px; }
  .pct-done { background: #EAF3DE; color: #3B6D11; }
  .pct-mid  { background: #E6F1FB; color: #185FA5; }
  .pct-low  { background: #f0f0ee; color: var(--muted); }

  /* 푸터 */
  .footer {
    text-align: center; font-size: 13px; color: var(--muted);
    flex-shrink: 0; padding-bottom: 2px;
  }

  .loading { text-align:center; padding:2rem; color:var(--muted); font-size:14px; }
  .error   { text-align:center; padding:2rem; color:#c0392b; font-size:14px; }
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div>
      <h1>경곽 러닝 챌린지 현황</h1>
      <div class="sub">학급달리기 &amp; 교직원 함께 달리기</div>
    </div>
    <span class="date-badge" id="date-badge">불러오는 중…</span>
  </div>

  <div class="grid" id="grid">
    <div class="panel"><div class="loading">데이터 불러오는 중…</div></div>
    <div class="panel"></div>
    <div class="panel"></div>
    <div class="panel"></div>
  </div>

  <div class="footer">우리 각자의 삶의 속도를 응원합니다 ❤️</div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSp1YvkLLSO2V3AD_13rH0hRWc7NUkMUhogxIimvvmrjy5kYNgk_3UtKCaTWO32S2bnqO4_W3vA6MO_/pub?output=csv";

function parseCSV(text) {
  return text.replace(/\r/g,"").split("\n").map(line => {
    const cols=[]; let cur="", inQ=false;
    for(const ch of line){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    return cols;
  });
}

function isClass(g){ return /^\d{2}-\d{2}$/.test(g); }
function labelGroup(g){
  const m=g.match(/^(\d{2})-(\d{2})$/);
  return m ? parseInt(m[1])+"학년 "+parseInt(m[2])+"반" : g;
}
function pctClass(p){ return p>=100?"pct-done":p>0?"pct-mid":"pct-low"; }
function pctLabel(p){ return p>=100?"완료 ✓":p>0?p+"%":"미시작"; }
const RC=["r1","r2","r3"], NC=["g","s","b"];

function clsRow(c, i, maxTotal){
  const w=(c.total/maxTotal*100).toFixed(1);
  return `<div class="cls-row ${RC[i]||""}">
    <div class="cls-rank ${NC[i]||""}">${i+1}</div>
    <div class="cls-name">${labelGroup(c.group)}</div>
    <div class="cls-info">
      <div class="cls-meta">${c.active}/${c.members}명 활동</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${w}%;background:var(--purple)"></div></div>
    </div>
    <div class="cls-right">
      <span class="cls-dist">${c.total.toFixed(1)}</span><span class="cls-unit">km</span>
      <div class="cls-avg">평균 ${c.avg.toFixed(1)}km</div>
    </div>
  </div>`;
}

function runRow(r, i, maxDist, color){
  const pct=Math.min(r.pct,100);
  const w=(r.dist/maxDist*100).toFixed(1);
  return `<div class="run-row ${RC[i]||""}">
    <div class="run-rank ${NC[i]||""}">${i+1}</div>
    <div class="run-info">
      <div class="run-name">${r.name}</div>
      <div class="run-nick">${r.nick}</div>
      <div class="run-bar"><div class="run-bar-fill" style="width:${w}%;background:${color}"></div></div>
    </div>
    <div class="run-right">
      <span class="run-dist">${r.dist.toFixed(2)}</span><span class="run-unit">km</span>
      <br><span class="pct-pill ${pctClass(r.pct)}">${pctLabel(r.pct)}</span>
    </div>
  </div>`;
}

function panel(title, tagClass, tagLabel, bodyHTML){
  return `<div class="panel">
    <div class="panel-head">
      <span class="panel-title">${title}</span>
      <span class="tag ${tagClass}">${tagLabel}</span>
    </div>
    <div class="panel-body">${bodyHTML}</div>
  </div>`;
}

async function init(){
  try {
    const res = await fetch(CSV_URL);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const rows = parseCSV(await res.text());

    const all=[];
    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      if(!r[0]||r[0]==="") continue;
      const pct=parseInt((r[9]||"0").replace("%",""))||0;
      const dist=parseFloat(r[6])||0;
      const count=parseInt(r[5])||0;
      all.push({name:r[0].trim(),nick:r[2].trim(),group:r[4].trim(),count,dist,pct});
    }
    all.sort((a,b)=>b.dist-a.dist);

    /* 학급 집계 */
    const cm={};
    all.forEach(r=>{
      if(!isClass(r.group)) return;
      if(!cm[r.group]) cm[r.group]={total:0,members:0,active:0};
      cm[r.group].total+=r.dist;
      cm[r.group].members++;
      if(r.count>0) cm[r.group].active++;
    });
    const clsRanks=Object.entries(cm)
      .map(([g,v])=>({group:g,...v,avg:v.total/v.members}))
      .sort((a,b)=>b.total-a.total);

    const maxCls  = clsRanks[0]?.total||1;
    const labList = all.filter(r=>r.group==="러닝랩");
    const stfList = all.filter(r=>r.group==="교직원");
    const stuList = all.filter(r=>isClass(r.group));
    const maxLab  = labList[0]?.dist||1;
    const maxStf  = stfList[0]?.dist||1;
    const maxStu  = stuList[0]?.dist||1;

    const now=new Date();
    document.getElementById("date-badge").textContent=
      `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")} 기준`;

    document.getElementById("grid").innerHTML =
      panel("학급 단체 순위","tag-cls","Class",
        clsRanks.map((c,i)=>clsRow(c,i,maxCls)).join("")) +
      panel("러닝랩 개인 순위","tag-lab","Lab",
        labList.map((r,i)=>runRow(r,i,maxLab,"#1D9E75")).join("")) +
      panel("학생 개인 순위","tag-stu","Student",
        stuList.map((r,i)=>runRow(r,i,maxStu,"#7F77DD")).join("")) +
      panel("교직원 개인 순위","tag-staff","Staff",
        stfList.map((r,i)=>runRow(r,i,maxStf,"#378ADD")).join(""));

  } catch(e){
    document.getElementById("grid").innerHTML=
      `<div class="error">데이터 오류: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
